<h1>Mission Control Center</h1>

<div class="container">
    <app-hero-card
        *ngFor="let h of list"

        [hero]="h"
        (onCompleted)="handleCompleted(h)"
        (onEdit)="handleEdit(h)"
    ></app-hero-card>
</div>

<p>Missioni completate: {{ totalCompleted }}</p>

<app-hero-generator
    [hero]="heroSelected"
    (onGenerateHero)="handleGenerateHero($event)"
></app-hero-generator>
